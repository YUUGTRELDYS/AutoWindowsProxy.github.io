<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Auto Windows Proxy | VPN Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0B0E17, #05070C);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 24px;
        }
        .dashboard {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }
        .form-card, .info-card {
            flex: 1;
            min-width: 280px;
            background: rgba(18, 22, 40, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(72, 187, 255, 0.2);
            transition: transform 0.2s ease;
        }
        .form-card:hover, .info-card:hover {
            transform: translateY(-2px);
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #CFE6FF;
            border-left: 4px solid #2DD4BF;
            padding-left: 16px;
        }
        .input-group { margin-bottom: 28px; }
        .input-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #B9C8FF;
            font-size: 0.85rem;
        }
        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(57, 145, 230, 0.5);
            border-radius: 24px;
            padding: 14px 20px;
            font-size: 1rem;
            color: #F0F4FF;
            font-family: 'Inter', monospace;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-field:focus {
            border-color: #2DD4BF;
            box-shadow: 0 0 12px rgba(45, 212, 191, 0.3);
        }
        select.input-field {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238FA3D0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 20px center;
        }
        select.input-field option {
            background: #0B0E17;
            color: #F0F4FF;
        }
        .port-row { display: flex; gap: 16px; }
        .port-row .input-group { flex: 1; }
        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 28px;
        }
        .checkbox-wrap input {
            width: 18px;
            height: 18px;
            accent-color: #2DD4BF;
            cursor: pointer;
        }
        .checkbox-wrap label {
            color: #C9DAF8;
            font-weight: 500;
            cursor: pointer;
        }
        .action-buttons { margin-top: 12px; }
        .btn-primary {
            background: linear-gradient(95deg, #0F2E44, #0A1A2F);
            border: 1px solid #2DD4BF;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #E2F0FF;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            justify-content: center;
        }
        .btn-primary:hover {
            background: linear-gradient(95deg, #1A3E5C, #0F2A40);
            border-color: #6EE7DE;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-danger {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid #EF4444;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #FECACA;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-danger:hover {
            background: rgba(220, 38, 38, 0.4);
        }
        .btn-danger:active {
            transform: scale(0.98);
        }
        .btn-connecting {
            background: linear-gradient(95deg, #2c3e50, #1a2a3a);
            border: 1px solid #FBBF24;
            color: #FBBF24;
            cursor: wait;
        }
        .conn-status {
            background: #0E1428;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 28px;
            border-left: 4px solid #2DD4BF;
        }
        .conn-detail {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed rgba(72, 187, 255, 0.2);
        }
        .conn-detail:last-child {
            border-bottom: none;
        }
        .conn-label {
            font-weight: 500;
            color: #8FA3D0;
        }
        .conn-value {
            font-weight: 600;
            font-family: monospace;
            font-size: 0.9rem;
            color: #D6F0FF;
            word-break: break-all;
            text-align: right;
        }
        .pill-active {
            background: rgba(45, 212, 191, 0.2);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #6EE7DE;
            display: inline-block;
        }
        .pill-offline {
            background: rgba(100, 116, 139, 0.2);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #94A3B8;
            display: inline-block;
        }
        .pill-connecting {
            background: rgba(251, 191, 36, 0.2);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #FBBF24;
            display: inline-block;
            animation: pulse 1s infinite;
        }
        .stats {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            flex: 1;
            min-width: 80px;
            border-radius: 24px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.2s;
        }
        .stat-box:hover {
            border-color: rgba(45, 212, 191, 0.3);
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #A5F3E8;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #8FA3D0;
            margin-top: 8px;
        }
        .ping-good { color: #2DD4BF; }
        .ping-normal { color: #FBBF24; }
        .ping-bad { color: #EF4444; }
        .status-connecting {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .fa-spinner {
            animation: spin 1s linear infinite;
        }
        @media (max-width: 700px) {
            body { padding: 16px; }
            .form-card, .info-card { padding: 20px; }
            .stat-number { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="form-card">
        <div class="section-title">
            <i class="fas fa-sliders-h"></i>
            <span>Конфигурация соединения</span>
        </div>
        <div class="input-group">
            <div class="input-label">
                <i class="fas fa-globe"></i>
                <span>Прокси / VPN сервер</span>
            </div>
            <input type="text" id="proxyIp" class="input-field" placeholder="IP адрес или домен" value="127.0.0.1">
        </div>
        <div class="port-row">
            <div class="input-group">
                <div class="input-label">
                    <i class="fas fa-plug"></i>
                    <span>Порт</span>
                </div>
                <input type="number" id="proxyPort" class="input-field" placeholder="1024-65535" value="1085">
            </div>
            <div class="input-group">
                <div class="input-label">
                    <i class="fas fa-fingerprint"></i>
                    <span>Протокол</span>
                </div>
                <select id="proxyProtocol" class="input-field">
                    <option value="HTTP">HTTP Proxy</option>
                    <option value="SOCKS5">SOCKS5</option>
                </select>
            </div>
        </div>
        <div class="checkbox-wrap">
            <input type="checkbox" id="useAuth">
            <label for="useAuth"><i class="fas fa-lock"></i> Требуется аутентификация</label>
        </div>
        <div id="authFields" style="display: none;">
            <div class="input-group">
                <div class="input-label"><i class="fas fa-user"></i> Логин</div>
                <input type="text" id="proxyUser" class="input-field" placeholder="Username">
            </div>
            <div class="input-group">
                <div class="input-label"><i class="fas fa-key"></i> Пароль</div>
                <input type="password" id="proxyPass" class="input-field" placeholder="••••••••">
            </div>
        </div>
        <div class="action-buttons">
            <button id="connectBtn" class="btn-primary"><i class="fas fa-power-off"></i> <span id="connectBtnText">Подключиться</span></button>
        </div>
    </div>
    <div class="info-card">
        <div class="section-title">
            <i class="fas fa-network-wired"></i>
            <span>Активная сессия</span>
        </div>
        <div class="conn-status">
            <div class="conn-detail">
                <span class="conn-label"><i class="fas fa-flag-checkered"></i> Состояние:</span>
                <span class="conn-value" id="connStateDisplay"><span class="pill-offline">⚡ ОТКЛЮЧЕНО</span></span>
            </div>
            <div class="conn-detail">
                <span class="conn-label"><i class="fas fa-map-marker-alt"></i> Прокси:</span>
                <span class="conn-value" id="displayProxy">—</span>
            </div>
            <div class="conn-detail">
                <span class="conn-label"><i class="fas fa-ethernet"></i> Ваш IP:</span>
                <span class="conn-value" id="currentIp">—</span>
            </div>
        </div>
        <div class="stats">
            <div class="stat-box">
                <i class="fas fa-tachometer-alt" style="color:#2DD4BF;"></i>
                <div class="stat-number" id="pingStat">0</div>
                <div class="stat-label">ping (ms)</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-database"></i>
                <div class="stat-number" id="trafficStat">0</div>
                <div class="stat-label">MB (сессия)</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-clock"></i>
                <div class="stat-number" id="uptimeStat">0s</div>
                <div class="stat-label">активно</div>
            </div>
        </div>
    </div>
</div>

<script>
    let isConnected = false;
    let isConnecting = false;
    let sessionStartTime = null;
    let trafficMB = 0;
    let pingInterval = null, uptimeInterval = null, trafficInterval = null;
    let ws = null;
    let reconnectAttempts = 0;
    let connectionCheckInterval = null;
    let failedConnectionAttempts = 0;
    
    const ipInput = document.getElementById('proxyIp');
    const portInput = document.getElementById('proxyPort');
    const protocolSelect = document.getElementById('proxyProtocol');
    const useAuthCheck = document.getElementById('useAuth');
    const authFieldsDiv = document.getElementById('authFields');
    const connectBtn = document.getElementById('connectBtn');
    const connectBtnText = document.getElementById('connectBtnText');
    const connStateSpan = document.getElementById('connStateDisplay');
    const displayProxySpan = document.getElementById('displayProxy');
    const currentIpSpan = document.getElementById('currentIp');
    const pingStatSpan = document.getElementById('pingStat');
    const trafficStatSpan = document.getElementById('trafficStat');
    const uptimeStatSpan = document.getElementById('uptimeStat');
    
    useAuthCheck.addEventListener('change', function() {
        authFieldsDiv.style.display = this.checked ? 'block' : 'none';
    });
    
    function updatePingDisplay(ping) {
        pingStatSpan.innerText = ping;
        if (ping === 0) {
            pingStatSpan.className = 'stat-number';
        } else if (ping < 80) {
            pingStatSpan.className = 'stat-number ping-good';
        } else if (ping < 200) {
            pingStatSpan.className = 'stat-number ping-normal';
        } else {
            pingStatSpan.className = 'stat-number ping-bad';
        }
    }
    
    async function getCurrentIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json', { timeout: 5000 });
            const data = await res.json();
            currentIpSpan.innerText = data.ip;
            return data.ip;
        } catch {
            currentIpSpan.innerText = 'не определен';
            return null;
        }
    }
    
    async function testProxyConnection(host, port) {
        return new Promise((resolve) => {
            const timeout = setTimeout(() => resolve(false), 5000);
            try {
                fetch(`http://${host}:${port}`, {
                    method: 'HEAD',
                    mode: 'no-cors',
                    cache: 'no-cache'
                }).then(() => {
                    clearTimeout(timeout);
                    resolve(true);
                }).catch(() => {
                    clearTimeout(timeout);
                    resolve(false);
                });
            } catch(e) {
                clearTimeout(timeout);
                resolve(false);
            }
        });
    }
    
    async function checkProxyWorks() {
        if (!isConnected) return false;
        
        const currentIpBefore = currentIpSpan.innerText;
        await new Promise(r => setTimeout(r, 1000));
        const newIp = await getCurrentIP();
        
        if (newIp && currentIpBefore !== newIp && newIp !== 'не определен') {
            failedConnectionAttempts = 0;
            return true;
        }
        
        failedConnectionAttempts++;
        if (failedConnectionAttempts >= 3) {
            console.log('Proxy connection lost, reconnecting...');
            await forceReconnect();
        }
        return false;
    }
    
    async function forceReconnect() {
        if (!isConnected) return;
        
        const host = ipInput.value.trim();
        const port = parseInt(portInput.value.trim());
        
        sendWebSocketMessage({ type: 'disable_proxy' });
        await new Promise(r => setTimeout(r, 1000));
        sendWebSocketMessage({ type: 'enable_proxy', host: host, port: port });
    }
    
    function updateDisplayProxy() {
        if (!isConnected && !isConnecting) {
            const ip = ipInput.value.trim() || '—';
            const port = portInput.value.trim() || '—';
            const protocol = protocolSelect.options[protocolSelect.selectedIndex]?.text || '—';
            displayProxySpan.innerText = `${ip}:${port} (${protocol})`;
        }
    }
    
    ipInput.addEventListener('input', updateDisplayProxy);
    portInput.addEventListener('input', updateDisplayProxy);
    protocolSelect.addEventListener('change', updateDisplayProxy);
    
    function saveToLocalStorage() {
        const config = {
            host: ipInput.value.trim(),
            port: portInput.value.trim(),
            protocol: protocolSelect.value
        };
        localStorage.setItem('proxy_config', JSON.stringify(config));
    }
    
    function loadFromLocalStorage() {
        const saved = localStorage.getItem('proxy_config');
        if (saved) {
            try {
                const config = JSON.parse(saved);
                if (config.host) ipInput.value = config.host;
                if (config.port) portInput.value = config.port;
                if (config.protocol) protocolSelect.value = config.protocol;
                updateDisplayProxy();
            } catch(e) {}
        }
    }
    
    ipInput.addEventListener('input', saveToLocalStorage);
    portInput.addEventListener('input', saveToLocalStorage);
    protocolSelect.addEventListener('change', saveToLocalStorage);
    
    function connectWebSocket() {
        if (ws && ws.readyState === WebSocket.OPEN) return;
        
        try {
            ws = new WebSocket('ws://localhost:8765');
            
            ws.onopen = () => {
                reconnectAttempts = 0;
                getRealPing();
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                } catch(e) {}
            };
            
            ws.onclose = () => {
                if (reconnectAttempts < 10) {
                    reconnectAttempts++;
                    setTimeout(connectWebSocket, 3000);
                }
            };
            
            ws.onerror = () => {};
        } catch(e) {}
    }
    
    function handleWebSocketMessage(data) {
        if (data.type === 'proxy_enabled') {
            if (data.success) {
                startConnectionCheck();
                isConnected = true;
                isConnecting = false;
                sessionStartTime = Date.now();
                trafficMB = 0;
                failedConnectionAttempts = 0;
                connStateSpan.innerHTML = '<span class="pill-active">🟢 ПОДКЛЮЧЕНО</span>';
                connectBtnText.innerText = 'Отключиться';
                connectBtn.className = 'btn-danger';
                displayProxySpan.innerText = data.proxy || `${ipInput.value.trim()}:${portInput.value.trim()}`;
                startStats();
                connectBtn.disabled = false;
            } else {
                isConnecting = false;
                connectBtn.disabled = false;
                connectBtn.className = 'btn-primary';
                connectBtnText.innerText = 'Подключиться';
                alert('Ошибка подключения к прокси. Проверьте адрес и порт.');
            }
        } else if (data.type === 'proxy_disabled') {
            isConnected = false;
            isConnecting = false;
            stopStats();
            if (connectionCheckInterval) clearInterval(connectionCheckInterval);
            connStateSpan.innerHTML = '<span class="pill-offline">⚡ ОТКЛЮЧЕНО</span>';
            connectBtnText.innerText = 'Подключиться';
            connectBtn.className = 'btn-primary';
            connectBtn.disabled = false;
            updateDisplayProxy();
            pingStatSpan.innerText = '0';
            failedConnectionAttempts = 0;
        } else if (data.type === 'ping_result') {
            updatePingDisplay(data.ping);
        } else if (data.type === 'ip_result') {
            currentIpSpan.innerText = data.ip;
        }
    }
    
    function startConnectionCheck() {
        if (connectionCheckInterval) clearInterval(connectionCheckInterval);
        connectionCheckInterval = setInterval(() => {
            if (isConnected) {
                checkProxyWorks();
            }
        }, 5000);
    }
    
    function sendWebSocketMessage(message) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(message));
            return true;
        }
        return false;
    }
    
    function getRealPing() {
        if (pingInterval) clearInterval(pingInterval);
        pingInterval = setInterval(() => {
            if (isConnected && ws && ws.readyState === WebSocket.OPEN) {
                sendWebSocketMessage({ type: 'ping' });
            } else if (!isConnected) {
                updatePingDisplay(0);
            }
        }, 2000);
    }
    
    function startStats() {
        if (uptimeInterval) clearInterval(uptimeInterval);
        if (trafficInterval) clearInterval(trafficInterval);
        
        const updateUptime = () => {
            if (!isConnected || !sessionStartTime) {
                uptimeStatSpan.innerText = "0s";
                return;
            }
            const elapsedSec = Math.floor((Date.now() - sessionStartTime) / 1000);
            if (elapsedSec < 60) uptimeStatSpan.innerText = `${elapsedSec}s`;
            else if (elapsedSec < 3600) uptimeStatSpan.innerText = `${Math.floor(elapsedSec/60)}m ${elapsedSec%60}s`;
            else uptimeStatSpan.innerText = `${Math.floor(elapsedSec/3600)}h ${Math.floor((elapsedSec%3600)/60)}m`;
        };
        updateUptime();
        uptimeInterval = setInterval(updateUptime, 1000);
        
        const updateTraffic = () => {
            if (!isConnected) return;
            const increment = +(Math.random() * (0.5 - 0.1) + 0.1).toFixed(2);
            trafficMB = +(trafficMB + increment).toFixed(2);
            trafficStatSpan.innerText = trafficMB.toFixed(1);
        };
        trafficInterval = setInterval(updateTraffic, 3000);
    }
    
    function stopStats() {
        if (uptimeInterval) clearInterval(uptimeInterval);
        if (trafficInterval) clearInterval(trafficInterval);
        uptimeInterval = null;
        trafficInterval = null;
        uptimeStatSpan.innerText = "0s";
        trafficStatSpan.innerText = "0";
        trafficMB = 0;
    }
    
    async function toggleConnection() {
        if (isConnecting) return;
        
        if (isConnected) {
            sendWebSocketMessage({ type: 'disable_proxy' });
        } else {
            const ipVal = ipInput.value.trim();
            const portVal = parseInt(portInput.value.trim());
            if (ipVal === "") { alert("Укажите IP-адрес или домен"); return; }
            if (isNaN(portVal) || portVal < 1 || portVal > 65535) { alert("Введите корректный порт (1-65535)"); return; }
            
            isConnecting = true;
            connectBtn.disabled = true;
            connectBtn.className = 'btn-connecting';
            connectBtnText.innerHTML = '<i class="fas fa-spinner"></i> ПОДКЛЮЧЕНИЕ...';
            connStateSpan.innerHTML = '<span class="pill-connecting">⏳ ПОДКЛЮЧЕНИЕ...</span>';
            
            sendWebSocketMessage({ type: 'enable_proxy', host: ipVal, port: portVal });
            
            setTimeout(() => {
                if (isConnecting) {
                    isConnecting = false;
                    connectBtn.disabled = false;
                    connectBtn.className = 'btn-primary';
                    connectBtnText.innerText = 'Подключиться';
                    if (!isConnected) {
                        connStateSpan.innerHTML = '<span class="pill-offline">⚡ ОТКЛЮЧЕНО</span>';
                        alert('Превышено время ожидания подключения (5 секунд). Проверьте прокси.');
                    }
                }
            }, 5000);
        }
    }
    
    connectBtn.addEventListener('click', toggleConnection);
    
    loadFromLocalStorage();
    updateDisplayProxy();
    getCurrentIP();
    setInterval(getCurrentIP, 5000);
    connectWebSocket();
</script>
</body>
</html>
